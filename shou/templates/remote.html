<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Shou · Remote</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest?k={{ token }}" />
  <meta name="theme-color" content="#0a0a0c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='remote.css') }}" />
  <script>window.SHOU_TOKEN = {{ token|tojson }};</script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="aura" aria-hidden="true"></div>

  <!-- Top bar : wordmark + live status -->
  <header class="topbar reveal" style="--d:0">
    <div class="brand">
      <span class="brand-glyph">朱</span>
      <span class="brand-text">
        <span class="brand-name">SHOU</span>
        <span class="brand-sub">アニメ・リモート</span>
      </span>
    </div>
    <div id="conn" class="conn"><span class="dot"></span><span id="conn-text">connecting</span></div>
  </header>

  <!-- Now-showing hero : live mirror of the kiosk -->
  <section id="hero" class="hero reveal" style="--d:1">
    <div id="mirror-bg" class="hero-bg"></div>
    <div class="hero-scrim"></div>
    <span class="hero-rail" aria-hidden="true"></span>

    <div class="hero-body">
      <img id="mirror-cover" class="hero-cover" alt="" />
      <div class="hero-meta">
        <div class="hero-kicker"><span id="mirror-view">—</span><span id="mirror-index" class="hero-index"></span></div>
        <h1 id="mirror-title" class="hero-title">Shou</h1>
        <div id="mirror-episode" class="hero-episode"></div>
      </div>
    </div>
    <div class="hero-progress"><span id="mirror-progress" class="hero-progress-fill"></span></div>
  </section>

  <!-- List switcher -->
  <div class="seg seg-3 reveal" id="listseg" style="--d:2">
    <span class="seg-thumb" aria-hidden="true"></span>
    <button class="seg-btn active" data-list="watching">Watching</button>
    <button class="seg-btn" data-list="planned">Planned</button>
    <button class="seg-btn" data-list="search">Search</button>
  </div>

  <!-- Continue watching : tap a half-finished episode to resume it on the PC -->
  <section id="resume" class="resume reveal hidden" style="--d:3">
    <div class="resume-head">
      <span class="resume-jp">続きから</span>
      <span class="resume-en">Continue Watching</span>
    </div>
    <div id="resume-rail" class="resume-rail"></div>
  </section>

  <!-- Control deck -->
  <section class="deck">
    <div class="nav-row reveal" style="--d:3">
      <button class="btn btn-nav" data-act="left" aria-label="Previous">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
      </button>
      <button class="btn btn-select" data-act="select">
        <span class="select-mark">●</span><span>SELECT</span>
      </button>
      <button class="btn btn-nav" data-act="right" aria-label="Next">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

    <div class="ghost-row reveal" style="--d:4">
      <button class="btn btn-ghost btn-open" data-act="open">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v9"/><path d="M6.5 6.5a8 8 0 1 0 11 0"/></svg>
        <span>Open</span>
      </button>
      <button class="btn btn-ghost btn-back" data-act="back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>
        <span>Back</span>
      </button>
    </div>

    <div class="transport reveal" style="--d:5">
      <div class="transport-label">Transport</div>
      <div class="transport-row">
        <button class="btn btn-tp" data-act="prev" aria-label="Previous episode">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="5.5" y="6" width="2.4" height="12" rx=".6"/><path d="M19 6.2 10 12l9 5.8z"/></svg>
        </button>
        <button class="btn btn-tp btn-tp-main" data-act="pause" aria-label="Play / pause">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 5l7 5-7 5z"/><rect x="14" y="5" width="2.7" height="10" rx=".7"/><rect x="18.4" y="5" width="2.7" height="10" rx=".7"/></svg>
        </button>
        <button class="btn btn-tp" data-act="next" aria-label="Next episode">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M5 6.2 14 12l-9 5.8z"/><rect x="16.1" y="6" width="2.4" height="12" rx=".6"/></svg>
        </button>
      </div>
      <div class="seek-row">
        <button class="btn btn-seek" data-act="rew">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4v5h5"/><path d="M3.5 9a9 9 0 1 1-1.2 5"/></svg>
          <span>30s</span>
        </button>
        <button class="btn btn-seek" data-act="fwd">
          <span>30s</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4v5h-5"/><path d="M20.5 9a9 9 0 1 0 1.2 5"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- Search new : query box + results + nav + on-screen keyboard -->
  <section id="search-panel" class="search-panel hidden">
    <div class="sp-box">
      <span id="sp-query" class="sp-query"></span>
      <span class="sp-caret" aria-hidden="true"></span>
      <span id="sp-ph" class="sp-ph">Search AniList…</span>
      <button id="sp-clear" class="sp-clear" aria-label="Clear search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>
    </div>

    <div id="sp-results" class="sp-results"></div>

    <div class="sp-nav">
      <button class="btn btn-nav" data-act="left" aria-label="Up">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 15l7-7 7 7"/></svg>
      </button>
      <button class="btn btn-select" data-act="select"><span class="select-mark">●</span><span>SELECT</span></button>
      <button class="btn btn-nav" data-act="right" aria-label="Down">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9l7 7 7-7"/></svg>
      </button>
    </div>

    <div id="sp-keyboard" class="sp-keyboard"></div>

    <div id="sp-filters" class="sp-filters hidden">
      <div class="sp-filters-head">
        <button class="sp-filters-back" data-filter-back aria-label="Back to keyboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          <span>Keyboard</span>
        </button>
        <span class="sp-filters-title">Genres</span>
        <button id="sp-filters-clear" class="sp-filters-clear hidden">Clear</button>
      </div>
      <div id="sp-genres" class="sp-genres"></div>
    </div>
  </section>

  <!-- Status config : set the focused anime's AniList list status -->
  <section id="status-panel" class="status-panel hidden">
    <div class="st-head">
      <img id="st-cover" class="st-cover" alt="" />
      <div class="st-head-meta">
        <div id="st-title" class="st-title"></div>
        <div id="st-now" class="st-now"></div>
      </div>
    </div>
    <div class="st-label">Set status</div>
    <div id="st-buttons" class="st-buttons"></div>
    <button class="btn btn-ghost st-back" data-act="back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a5 5 0 0 1 0 10h-3"/></svg>
      <span>Back to results</span>
    </button>
  </section>

  <div id="toast" class="toast"></div>

  <script src="{{ url_for('static', filename='remote.js') }}"></script>
</body>
</html>
