<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shou</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho+B1:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>
  <!-- Ambient backdrop : two layers, cross-faded on selection -->
  <div id="backdrop-a" class="backdrop-layer is-on"></div>
  <div id="backdrop-b" class="backdrop-layer"></div>
  <div id="vignette"></div>
  <div class="grain" aria-hidden="true"></div>

  <header id="topbar">
    <div class="brand">
      <span class="brand-glyph">朱</span>
      <span class="brand-text">
        <span class="brand-name">SHOU</span>
        <span class="brand-sub">アニメ・シアター</span>
      </span>
    </div>
    <span id="count" class="count"></span>
  </header>

  <!-- Bottom dock : continue-watching shelf (display only) + list label -->
  <div id="dock" class="dock">
    <section id="resume-shelf" class="resume-shelf hidden" aria-hidden="true">
      <div class="resume-shelf-head">
        <span class="resume-shelf-jp">続きから</span>
        <span class="resume-shelf-en">Continue Watching</span>
      </div>
      <div id="resume-strip" class="resume-strip"></div>
    </section>
    <span id="listlabel" class="listlabel">WATCHING</span>
  </div>

  <!-- Coverflow -->
  <main id="stage" class="hidden">
    <div id="carousel"></div>
    <section id="info">
      <div id="info-kicker" class="info-kicker">NOW WATCHING</div>
      <h1 id="info-title" class="info-title">—</h1>
      <div id="info-episode" class="episode">—</div>
      <div class="progress"><div id="info-bar" class="progress-fill"></div></div>
    </section>
  </main>

  <!-- Sequel recommendation -->
  <section id="sequel-view" class="overlay hidden">
    <div class="cinema-card sequel-card">
      <div class="sequel-kicker">✓&nbsp; ALL CAUGHT UP</div>
      <div class="sequel-finished">You finished <span id="seq-finished"></span></div>
      <div class="sequel-label">Recommended sequel</div>
      <h1 id="seq-title" class="sequel-title"></h1>
      <div class="sequel-hint">Press <b>●&nbsp;Select</b> again to begin · <b>⤺&nbsp;Back</b> to return</div>
    </div>
  </section>

  <!-- Playing -->
  <section id="playing-view" class="overlay hidden">
    <div class="cinema-card playing-card">
      <div class="spinner"></div>
      <div id="playing-msg" class="playing-msg">Launching…</div>
      <div class="playing-hint">Press <b>⤺&nbsp;Back</b> on your phone to return</div>
    </div>
  </section>

  <!-- Loading / empty / error -->
  <section id="status-view" class="overlay hidden">
    <div class="cinema-card status-card">
      <div id="status-spinner" class="spinner"></div>
      <div id="status-msg" class="status-msg">Loading…</div>
    </div>
  </section>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
