<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1b1a22"/>
      <stop offset="1" stop-color="#0d0c11"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="44%" r="55%">
      <stop offset="0" stop-color="#ff4a32" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#ff4a32" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- full-bleed background; glyph kept within the central maskable safe zone -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>
  <text x="256" y="264" text-anchor="middle" dominant-baseline="central"
        font-family="'Shippori Mincho B1','Shippori Mincho',serif" font-weight="800"
        font-size="250" fill="#ff4a32">朱</text>
</svg>
