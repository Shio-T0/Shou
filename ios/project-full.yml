# XcodeGen project definition — FULL (paid) build of Shou Remote.
#
# This variant needs a PAID Apple Developer account ($99/yr): it adds the home-screen
# widget + iOS-18 Control, Wake-on-LAN broadcast, and the App Group / shared-Keychain
# that let the widget read live data — all of which require entitlements a free
# "Personal Team" can't sign. For the no-pay build use the default project.yml instead.
#
# On a Mac:
#   brew install xcodegen
#   cd ios && xcodegen generate --spec project-full.yml
#   open Shou.xcodeproj          # set your (paid) Team on both targets, then build
#
# (Or: ./generate.sh --full)
name: Shou
options:
  bundleIdPrefix: io.github.shiot0
  deploymentTarget:
    iOS: "17.0"                   # interactive widget (AppIntents) needs iOS 17
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""           # set your Apple Developer Team ID in Xcode
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  # --- The app: a WKWebView shell + native superpowers ------------------------
  Shou:
    type: application
    platform: iOS
    sources:
      - path: Shou
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.shiot0.shou
        PRODUCT_NAME: Shou Remote
        INFOPLIST_FILE: Shou/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Shou/Resources/Shou.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - target: ShouWidget
        embed: true

  # --- The widget + Control Center extension ---------------------------------
  ShouWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: ShouWidget
      # Shared core compiled into both targets (no framework needed for this size).
      - path: Shou/Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.shiot0.shou.widget
        PRODUCT_NAME: ShouWidget
        INFOPLIST_FILE: ShouWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: ShouWidget/ShouWidget.entitlements
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
