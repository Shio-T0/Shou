# XcodeGen project definition — FREE (default) build of Shou Remote.
#
# This is the build you can install WITHOUT paying Apple. It signs with a free
# "Personal Team" (just an Apple ID) and declares NO paid-only entitlements, so it
# installs on your own iPhone straight from Xcode. Trade-offs (see ios/README.md):
#
#   * No App Group / shared Keychain  -> no home-screen widget, no Control Center control
#   * No multicast entitlement        -> Wake-on-LAN is best-effort and usually won't fire
#   * Free signing expires after 7 days -> re-run from Xcode weekly to keep it installed
#
# Everything else — the remote, keep-awake, Bonjour scan, lock-screen controls, per-server
# shortcuts, new-episode notifications — works. For the full feature set on a PAID account,
# generate from project-full.yml instead (./generate.sh --full).
#
# On a Mac:
#   brew install xcodegen
#   cd ios && xcodegen generate        # reads this file
#   open Shou.xcodeproj                # Signing -> Team: pick your free Personal Team
name: Shou
options:
  bundleIdPrefix: io.github.shiot0
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""           # set your (free) Apple ID Personal Team in Xcode
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

targets:
  # --- The app only: a WKWebView shell + the free-tier native superpowers ------
  Shou:
    type: application
    platform: iOS
    sources:
      - path: Shou
        excludes:
          - "Resources/Shou.entitlements"   # paid-only; not signed in the free build
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.shiot0.shou
        PRODUCT_NAME: Shou Remote
        INFOPLIST_FILE: Shou/Resources/Info.plist
        # No CODE_SIGN_ENTITLEMENTS: a free Personal Team can't sign App Groups,
        # multicast, or shared-Keychain. The app's own Keychain still works.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
        SUPPORTS_MACCATALYST: NO
        # Compiles the app against the no-App-Group code paths (see ShouStore).
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: "$(inherited) SHOU_FREE"
